<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎲 骰子游戏</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    min-height: 100vh;
    color: #fff;
    overflow-x: hidden;
    user-select: none;
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 20px;
  }

  h1 {
    text-align: center;
    font-size: 2em;
    margin: 15px 0;
    text-shadow: 0 0 20px rgba(255, 200, 0, 0.5);
    cursor: default;
  }

  .hidden-mode-bar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 4px;
    z-index: 100;
  }
  .hidden-mode-bar .seg {
    float: left;
    width: 25%;
    height: 100%;
    opacity: 0;
    transition: opacity 0.3s;
    cursor: pointer;
  }
  .hidden-mode-bar .seg:hover { opacity: 0.15; }
  .hidden-mode-bar .seg.s0 { background: #ffd700; }
  .hidden-mode-bar .seg.s1 { background: #ff6b6b; }
  .hidden-mode-bar .seg.s2 { background: #ff922b; }
  .hidden-mode-bar .seg.s3 { background: #74c0fc; }

  .mode-hint {
    position: fixed;
    top: 6px;
    right: 10px;
    font-size: 0.65em;
    opacity: 0.25;
    z-index: 100;
    transition: opacity 0.3s;
  }
  .mode-hint:hover { opacity: 0.6; }

  .balance-bar {
    display: flex;
    justify-content: center;
    gap: 40px;
    margin: 10px 0 20px;
    font-size: 1.1em;
  }
  .balance-bar .item { display: flex; align-items: center; gap: 8px; }
  .balance-bar .val { font-weight: bold; font-size: 1.3em; color: #ffd700; }
  .balance-bar .val.opp { color: #ff6b6b; }

  .table {
    background: radial-gradient(ellipse at center, #1a5c2e 0%, #0d3318 70%, #091a0d 100%);
    border-radius: 30px;
    padding: 30px 20px;
    border: 4px solid #2a1a0a;
    box-shadow: inset 0 0 60px rgba(0,0,0,0.5), 0 10px 40px rgba(0,0,0,0.5);
    position: relative;
  }

  .players {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 15px;
    flex-wrap: wrap;
  }

  .player-area {
    flex: 1;
    min-width: 250px;
    text-align: center;
  }

  .player-area .label {
    font-size: 1.1em;
    font-weight: bold;
    margin-bottom: 12px;
    padding: 6px 20px;
    border-radius: 20px;
    display: inline-block;
  }
  .player-area.me .label { background: rgba(255,215,0,0.2); color: #ffd700; }
  .player-area.opp .label { background: rgba(255,107,107,0.2); color: #ff6b6b; }

  .dice-row {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin: 10px 0;
  }

  .dice-slot {
    text-align: center;
  }
  .dice-slot .slot-label {
    font-size: 0.75em;
    opacity: 0.5;
    margin-bottom: 6px;
  }

  .dice-wrap {
    width: 90px;
    height: 90px;
    perspective: 500px;
  }

  .dice {
    width: 90px;
    height: 90px;
    background: linear-gradient(145deg, #fff, #e0e0e0);
    border-radius: 16px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(3, 1fr);
    padding: 12px;
    gap: 3px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.5), inset 0 2px 3px rgba(255,255,255,0.8);
    transition: transform 0.3s;
  }

  .dice.rolling {
    animation: roll 0.5s ease-out;
  }

  .dice.waiting {
    opacity: 0.3;
  }

  .dice.hidden-dice {
    background: linear-gradient(145deg, #c0392b, #96281b);
    box-shadow: 0 6px 20px rgba(0,0,0,0.5), inset 0 2px 3px rgba(255,255,255,0.2);
  }

  @keyframes roll {
    0% { transform: rotateX(0) rotateY(0) scale(0.8); }
    25% { transform: rotateX(180deg) rotateY(90deg) scale(1.1); }
    50% { transform: rotateX(360deg) rotateY(180deg) scale(0.9); }
    75% { transform: rotateX(540deg) rotateY(270deg) scale(1.05); }
    100% { transform: rotateX(720deg) rotateY(360deg) scale(1); }
  }

  .dot-cell { display: flex; align-items: center; justify-content: center; }
  .dot {
    width: 16px; height: 16px;
    background: radial-gradient(circle at 35% 35%, #4a4a4a, #1a1a1a);
    border-radius: 50%;
    box-shadow: inset 0 2px 3px rgba(0,0,0,0.5);
    opacity: 0;
    transition: opacity 0.2s;
  }
  .dot.visible { opacity: 1; }
  .dice.hidden-dice .dot { background: radial-gradient(circle at 35% 35%, #ff6b6b, #c0392b); }

  .subtotal {
    margin-top: 8px;
    font-size: 0.9em;
    opacity: 0.7;
    min-height: 22px;
  }

  .center-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-width: 100px;
    padding-top: 30px;
  }
  .vs-badge {
    font-size: 2em;
    font-weight: bold;
    color: rgba(255,255,255,0.2);
  }
  .phase-label {
    margin-top: 10px;
    font-size: 0.85em;
    padding: 4px 14px;
    border-radius: 10px;
    background: rgba(255,255,255,0.1);
    min-height: 28px;
    text-align: center;
  }

  .bet-area {
    margin-top: 25px;
    text-align: center;
    display: none;
  }
  .bet-area.visible { display: block; }

  .bet-title {
    font-size: 1.1em;
    margin-bottom: 15px;
    color: #ffd700;
  }

  .bet-chips {
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 15px;
  }

  .chip {
    width: 60px; height: 60px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    font-size: 0.9em;
    cursor: pointer;
    border: 3px dashed rgba(255,255,255,0.4);
    transition: all 0.2s;
    position: relative;
  }
  .chip:hover { transform: scale(1.1); }
  .chip.selected { border-style: solid; transform: scale(1.15); box-shadow: 0 0 20px rgba(255,255,255,0.3); }
  .chip.c10 { background: #3498db; color: #fff; }
  .chip.c50 { background: #2ecc71; color: #fff; }
  .chip.c100 { background: #e74c3c; color: #fff; }
  .chip.c500 { background: #9b59b6; color: #fff; }
  .chip.c1000 { background: #f39c12; color: #fff; }
  .chip.cAll { background: linear-gradient(135deg, #ffd700, #ff6b00); color: #000; }

  .confirm-bet {
    padding: 14px 50px;
    font-size: 1.1em;
    font-weight: bold;
    color: #000;
    background: linear-gradient(145deg, #ffd700, #ffaa00);
    border: none;
    border-radius: 30px;
    cursor: pointer;
    transition: all 0.3s;
    box-shadow: 0 4px 15px rgba(255,215,0,0.4);
  }
  .confirm-bet:hover { transform: translateY(-2px); box-shadow: 0 6px 25px rgba(255,215,0,0.6); }
  .confirm-bet:disabled { opacity: 0.4; cursor: not-allowed; }

  .main-btn {
    display: block;
    width: 100%;
    max-width: 280px;
    margin: 20px auto 0;
    padding: 16px;
    font-size: 1.2em;
    font-weight: bold;
    color: #000;
    background: linear-gradient(145deg, #ffd700, #ffaa00);
    border: none;
    border-radius: 30px;
    cursor: pointer;
    transition: all 0.3s;
    box-shadow: 0 5px 20px rgba(255,215,0,0.4);
  }
  .main-btn:hover:not(:disabled) { transform: translateY(-2px); }
  .main-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .result-banner {
    text-align: center;
    font-size: 1.6em;
    font-weight: bold;
    margin: 20px 0 5px;
    min-height: 40px;
    display: none;
  }
  .result-banner.visible { display: block; }
  .result-banner.win { color: #51cf66; text-shadow: 0 0 20px rgba(81,207,102,0.5); }
  .result-banner.lose { color: #ff6b6b; text-shadow: 0 0 20px rgba(255,107,107,0.5); }
  .result-banner.tie { color: #ffd43b; }
  .result-detail {
    text-align: center;
    font-size: 0.95em;
    opacity: 0.7;
    margin-bottom: 10px;
    display: none;
  }
  .result-detail.visible { display: block; }

  .history {
    margin-top: 20px;
    background: rgba(0,0,0,0.3);
    border-radius: 16px;
    padding: 14px;
    max-height: 180px;
    overflow-y: auto;
    display: none;
  }
  .history.visible { display: block; }
  .history h3 { font-size: 0.9em; opacity: 0.6; margin-bottom: 8px; }
  .hist-item {
    display: flex;
    justify-content: space-between;
    padding: 6px 8px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    font-size: 0.8em;
  }
  .hist-item:last-child { border: none; }
  .hist-item .h-round { opacity: 0.4; width: 40px; }
  .hist-item .h-detail { flex: 1; text-align: center; }
  .hist-item .h-result { width: 80px; text-align: right; font-weight: bold; }
  .hist-item .h-result.win { color: #51cf66; }
  .hist-item .h-result.lose { color: #ff6b6b; }
  .hist-item .h-result.tie { color: #ffd43b; }

  .secret-panel {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.8);
    background: rgba(20, 15, 40, 0.98);
    border: 1px solid rgba(255,215,0,0.3);
    border-radius: 20px;
    padding: 25px;
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transition: all 0.3s;
    min-width: 280px;
  }
  .secret-panel.open {
    opacity: 1;
    pointer-events: auto;
    transform: translate(-50%, -50%) scale(1);
  }
  .secret-panel h3 { text-align: center; margin-bottom: 15px; color: #ffd700; font-size: 1em; }
  .secret-panel .opt {
    display: block;
    width: 100%;
    padding: 12px;
    margin-bottom: 8px;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 10px;
    background: rgba(255,255,255,0.05);
    color: #fff;
    font-size: 0.95em;
    cursor: pointer;
    text-align: left;
    transition: all 0.2s;
  }
  .secret-panel .opt:hover { background: rgba(255,255,255,0.15); }
  .secret-panel .opt.active { border-color: #ffd700; background: rgba(255,215,0,0.15); }
  .secret-panel .close-btn {
    display: block;
    margin: 10px auto 0;
    padding: 8px 30px;
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 20px;
    background: none;
    color: #fff;
    cursor: pointer;
    font-size: 0.85em;
  }

  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 199;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .overlay.open { opacity: 1; pointer-events: auto; }

  @media (max-width: 600px) {
    .players { flex-direction: column; align-items: center; }
    .center-area { padding-top: 10px; }
    .dice-wrap, .dice { width: 70px; height: 70px; padding: 8px; }
    .dot { width: 12px; height: 12px; }
    h1 { font-size: 1.4em; }
  }
</style>
</head>
<body>

<div class="hidden-mode-bar" id="secretBar">
  <div class="seg s0" onclick="setSecretMode(0)"></div>
  <div class="seg s1" onclick="setSecretMode(1)"></div>
  <div class="seg s2" onclick="setSecretMode(2)"></div>
  <div class="seg s3" onclick="setSecretMode(3)"></div>
</div>
<div class="mode-hint" id="modeHint">模式: 随机</div>

<div class="overlay" id="overlay" onclick="closeSecret()"></div>
<div class="secret-panel" id="secretPanel">
  <h3>🔧 模式切换</h3>
  <button class="opt" onclick="setSecretMode(0)">👑 我必赢</button>
  <button class="opt" onclick="setSecretMode(1)">💀 对方必赢</button>
  <button class="opt" onclick="setSecretMode(2)">🔥 5局内大概率赢</button>
  <button class="opt" onclick="setSecretMode(3)">🎯 纯随机</button>
  <button class="close-btn" onclick="closeSecret()">关闭</button>
</div>

<div class="container">
  <h1 id="title">🎲 骰子对决</h1>

  <div class="balance-bar">
    <div class="item">👤 我的筹码: <span class="val" id="myBalance">10000</span></div>
    <div class="item">🤖 对方筹码: <span class="val opp" id="oppBalance">10000</span></div>
  </div>

  <div class="table">
    <div class="players">
      <div class="player-area me">
        <div class="label">👤 我</div>
        <div class="dice-row">
          <div class="dice-slot">
            <div class="slot-label">骰子 1</div>
            <div class="dice-wrap"><div class="dice waiting" id="myDice1"></div></div>
          </div>
          <div class="dice-slot">
            <div class="slot-label">骰子 2</div>
            <div class="dice-wrap"><div class="dice waiting" id="myDice2"></div></div>
          </div>
        </div>
        <div class="subtotal" id="mySubtotal"></div>
      </div>

      <div class="center-area">
        <div class="vs-badge">VS</div>
        <div class="phase-label" id="phaseLabel">点击下方开始</div>
      </div>

      <div class="player-area opp">
        <div class="label">🤖 对方</div>
        <div class="dice-row">
          <div class="dice-slot">
            <div class="slot-label">骰子 1</div>
            <div class="dice-wrap"><div class="dice waiting" id="oppDice1"></div></div>
          </div>
          <div class="dice-slot">
            <div class="slot-label">骰子 2</div>
            <div class="dice-wrap"><div class="dice waiting" id="oppDice2"></div></div>
          </div>
        </div>
        <div class="subtotal" id="oppSubtotal"></div>
      </div>
    </div>

    <div class="bet-area" id="betArea">
      <div class="bet-title">💰 下注阶段</div>
      <p style="font-size:0.85em; opacity:0.6; margin-bottom:12px;" id="betHint">选择下注金额</p>
      
      <div class="bet-chips" id="betChips">
        <div class="chip c10" onclick="selectChip(10)">10</div>
        <div class="chip c50" onclick="selectChip(50)">50</div>
        <div class="chip c100" onclick="selectChip(100)">100</div>
        <div class="chip c500" onclick="selectChip(500)">500</div>
        <div class="chip c1000" onclick="selectChip(1000)">1K</div>
        <div class="chip cAll" onclick="selectChip(-1)">ALL</div>
      </div>

      <div style="text-align:center; margin-bottom:15px;">
        <span style="font-size:1.1em; color:#ffd700;">👑 押自己赢</span>
      </div>

      <button class="confirm-bet" id="confirmBet" onclick="confirmBet()" disabled>确认下注</button>
    </div>

    <div class="result-banner" id="resultBanner"></div>
    <div class="result-detail" id="resultDetail"></div>

    <button class="main-btn" id="mainBtn" onclick="startRound()">🎲 开始新一局</button>
  </div>

  <div class="history" id="history">
    <h3>📋 历史记录</h3>
    <div id="histList"></div>
  </div>
</div>

<script>
  let secretMode = 3;
  let roundNum = 0;
  let myBalance = 10000;
  let oppBalance = 10000;
  let wins = 0, losses = 0, ties = 0;

  let phase = 'idle';
  let myD1 = 0, myD2 = 0, oppD1 = 0, oppD2 = 0;
  let betAmount = 0, betDir = '';
  let selectedChip = 0;

  const DICE_PATTERNS = {
    1: [4], 2: [2,6], 3: [2,4,6],
    4: [0,2,6,8], 5: [0,2,4,6,8], 6: [0,2,3,5,6,8]
  };

  const MODE_NAMES = ['👑 我必赢', '💀 对方必赢', '🔥 5局内赢', '🎯 纯随机'];

  function renderDice(el, value, hidden) {
    el.className = 'dice' + (hidden ? ' hidden-dice' : '');
    el.innerHTML = '';
    if (!value) { el.classList.add('waiting'); return; }
    const pat = DICE_PATTERNS[value] || [];
    for (let i = 0; i < 9; i++) {
      const cell = document.createElement('div');
      cell.className = 'dot-cell';
      const dot = document.createElement('div');
      dot.className = 'dot' + (pat.includes(i) ? ' visible' : '');
      cell.appendChild(dot);
      el.appendChild(cell);
    }
  }

  function randInt(a, b) { return Math.floor(Math.random() * (b - a + 1)) + a; }

  function setSecretMode(m) {
    secretMode = m;
    document.getElementById('modeHint').textContent = '模式: ' + MODE_NAMES[m].split(' ')[1];
    closeSecret();
    const bar = document.getElementById('secretBar');
    bar.style.boxShadow = '0 0 20px rgba(255,215,0,0.8)';
    setTimeout(() => bar.style.boxShadow = 'none', 500);
  }

  function closeSecret() {
    document.getElementById('secretPanel').classList.remove('open');
    document.getElementById('overlay').classList.remove('open');
  }

  let titleClicks = 0, titleTimer = null;
  document.getElementById('title').addEventListener('click', () => {
    titleClicks++;
    clearTimeout(titleTimer);
    titleTimer = setTimeout(() => titleClicks = 0, 2000);
    if (titleClicks >= 5) {
      titleClicks = 0;
      document.getElementById('secretPanel').classList.add('open');
      document.getElementById('overlay').classList.add('open');
      document.querySelectorAll('.secret-panel .opt').forEach((o, i) => {
        o.classList.toggle('active', i === secretMode);
      });
    }
  });

  function controlledRoll(isMe, round, diceIndex) {
    if (secretMode === 0) {
      return isMe ? randInt(4, 6) : randInt(1, 3);
    } else if (secretMode === 1) {
      return isMe ? randInt(1, 3) : randInt(4, 6);
    } else if (secretMode === 2) {
      if (round <= 5) {
        return isMe ? randInt(3, 6) : randInt(1, 4);
      }
      return randInt(1, 6);
    }
    return randInt(1, 6);
  }

  function selectChip(val) {
    selectedChip = val;
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('selected'));
    event.target.classList.add('selected');
    checkBetReady();
  }

  function checkBetReady() {
    document.getElementById('confirmBet').disabled = !selectedChip;
  }

  function confirmBet() {
    if (!selectedChip) return;
    
    if (selectedChip === -1) {
      betAmount = myBalance;
    } else {
      betAmount = Math.min(selectedChip, myBalance);
    }
    betDir = 'me';

    document.getElementById('betArea').classList.remove('visible');
    document.getElementById('phaseLabel').textContent = '投第2个骰子...';
    
    setTimeout(() => startPhase2(), 500);
  }

  function startRound() {
    if (myBalance <= 0 || oppBalance <= 0) {
      myBalance = 10000;
      oppBalance = 10000;
      updateBalanceUI();
    }

    roundNum++;
    myD1 = myD2 = oppD1 = oppD2 = 0;
    betAmount = 0; betDir = '';
    selectedChip = 0;

    renderDice(document.getElementById('myDice1'), 0);
    renderDice(document.getElementById('myDice2'), 0);
    renderDice(document.getElementById('oppDice1'), 0);
    renderDice(document.getElementById('oppDice2'), 0);
    document.getElementById('mySubtotal').textContent = '';
    document.getElementById('oppSubtotal').textContent = '';
    document.getElementById('resultBanner').className = 'result-banner';
    document.getElementById('resultBanner').textContent = '';
    document.getElementById('resultDetail').className = 'result-detail';
    document.getElementById('betArea').classList.remove('visible');
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('selected'));

    document.getElementById('mainBtn').style.display = 'none';
    document.getElementById('phaseLabel').textContent = '投第1个骰子...';

    setTimeout(() => startPhase1(), 500);
  }

  function startPhase1() {
    phase = 'roll1';
    
    const myEl = document.getElementById('myDice1');
    const oppEl = document.getElementById('oppDice1');
    
    myEl.classList.add('rolling');
    oppEl.classList.add('rolling');

    let flickers = 0;
    const iv = setInterval(() => {
      renderDice(myEl, randInt(1, 6));
      renderDice(oppEl, randInt(1, 6));
      flickers++;
      if (flickers > 7) {
        clearInterval(iv);
        myEl.classList.remove('rolling');
        oppEl.classList.remove('rolling');
        
        myD1 = controlledRoll(true, roundNum, 0);
        oppD1 = controlledRoll(false, roundNum, 0);
        
        renderDice(myEl, myD1);
        renderDice(oppEl, oppD1);
        
        document.getElementById('mySubtotal').textContent = '当前: ' + myD1;
        document.getElementById('oppSubtotal').textContent = '当前: ' + oppD1;
        
        setTimeout(() => enterBetting(), 600);
      }
    }, 80);
  }

  function enterBetting() {
    phase = 'betting';
    document.getElementById('phaseLabel').textContent = '💰 下注阶段';
    document.getElementById('betArea').classList.add('visible');
    
    document.getElementById('betHint').textContent = 
      `当前点数 → 我: ${myD1}  对方: ${oppD1}  (还有1个骰子未投)`;
  }

  function startPhase2() {
    phase = 'roll2';
    document.getElementById('mainBtn').style.display = 'none';
    
    const myEl = document.getElementById('myDice2');
    const oppEl = document.getElementById('oppDice2');
    
    myEl.classList.add('rolling');
    oppEl.classList.add('rolling');

    let flickers = 0;
    const iv = setInterval(() => {
      renderDice(myEl, randInt(1, 6));
      renderDice(oppEl, randInt(1, 6));
      flickers++;
      if (flickers > 7) {
        clearInterval(iv);
        myEl.classList.remove('rolling');
        oppEl.classList.remove('rolling');
        
        myD2 = controlledRoll(true, roundNum, 1);
        oppD2 = controlledRoll(false, roundNum, 1);
        
        renderDice(myEl, myD2);
        renderDice(oppEl, oppD2);
        
        const myTotal = myD1 + myD2;
        const oppTotal = oppD1 + oppD2;
        
        document.getElementById('mySubtotal').textContent = '总计: ' + myTotal;
        document.getElementById('oppSubtotal').textContent = '总计: ' + oppTotal;
        
        setTimeout(() => showResult(myTotal, oppTotal), 500);
      }
    }, 80);
  }

  function showResult(myTotal, oppTotal) {
    phase = 'result';
    
    const banner = document.getElementById('resultBanner');
    const detail = document.getElementById('resultDetail');
    
    let outcome, resultText;
    
    if (myTotal > oppTotal) {
      outcome = 'win';
      resultText = '🎉 你赢了！';
      myBalance += betAmount;
      oppBalance -= betAmount;
      wins++;
    } else if (myTotal < oppTotal) {
      outcome = 'lose';
      resultText = '😢 你输了！';
      myBalance -= betAmount;
      oppBalance += betAmount;
      losses++;
    } else {
      outcome = 'tie';
      resultText = '⚖️ 平局！';
      ties++;
    }
    
    banner.textContent = resultText;
    banner.className = 'result-banner visible ' + outcome;
    
    detail.textContent = `我 ${myD1}+${myD2}=${myTotal} vs ${oppD1}+${oppD2}=${oppTotal}  |  下注: ${betAmount} (押自己赢)`;
    detail.className = 'result-detail visible';
    
    updateBalanceUI();
    addHistory(myTotal, oppTotal, outcome, betAmount);
    
    document.getElementById('phaseLabel').textContent = '本局结束';
    document.getElementById('mainBtn').style.display = 'block';
    document.getElementById('mainBtn').textContent = '🎲 开始新一局';
  }

  function updateBalanceUI() {
    document.getElementById('myBalance').textContent = myBalance;
    document.getElementById('oppBalance').textContent = oppBalance;
  }

  function addHistory(myT, oppT, outcome, bet) {
    const hist = document.getElementById('history');
    const list = document.getElementById('histList');
    hist.classList.add('visible');
    
    const txt = { win: '胜 +' + bet, lose: '负 -' + bet, tie: '平局' };
    const item = document.createElement('div');
    item.className = 'hist-item';
    item.innerHTML = `
      <span class="h-round">#${roundNum}</span>
      <span class="h-detail">我${myT} vs ${oppT}对方</span>
      <span class="h-result ${outcome}">${txt[outcome]}</span>
    `;
    list.insertBefore(item, list.firstChild);
  }

  renderDice(document.getElementById('myDice1'), 1);
  renderDice(document.getElementById('myDice2'), 1);
  renderDice(document.getElementById('oppDice1'), 1);
  renderDice(document.getElementById('oppDice2'), 1);
  document.getElementById('myDice1').classList.add('waiting');
  document.getElementById('myDice2').classList.add('waiting');
  document.getElementById('oppDice1').classList.add('waiting');
  document.getElementById('oppDice2').classList.add('waiting');
</script>

</body>
</html>
