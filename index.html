<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎲 挑战 hold-master</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);min-height:100vh;color:#fff;overflow-x:hidden;user-select:none}.container{max-width:900px;margin:0 auto;padding:20px}h1{text-align:center;font-size:2em;margin:15px 0;text-shadow:0 0 20px rgba(255,200,0,0.5);cursor:default}.rate-info{text-align:center;font-size:.75em;opacity:.5;margin-bottom:10px}
.table{background:radial-gradient(ellipse at center,#1a5c2e 0%,#0d3318 70%,#091a0d 100%);border-radius:30px;padding:30px 20px;border:4px solid #2a1a0a;box-shadow:inset 0 0 60px rgba(0,0,0,.5),0 10px 40px rgba(0,0,0,.5)}.players{display:flex;justify-content:space-between;align-items:flex-start;gap:15px;flex-wrap:wrap}.player-area{flex:1;min-width:250px;text-align:center}.player-area .label{font-size:1.1em;font-weight:bold;margin-bottom:8px;padding:6px 20px;border-radius:20px;display:inline-block}
.player-area .resources{margin-bottom:10px;padding:8px 12px;background:rgba(0,0,0,.3);border-radius:12px;display:inline-block;min-width:180px}
.player-area .resources .res-item{display:flex;align-items:center;justify-content:center;gap:6px;margin:4px 0;font-size:.95em}
.player-area .resources .res-val{font-weight:bold;font-size:1.3em}
.res-gold{color:#ffd700}.res-time{color:#51cf66}.res-water{color:#74c0fc}
.timer-warn .res-time{animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.player-area.boss .label{background:rgba(255,215,0,.2);color:#ffd700}.player-area.player .label{background:rgba(81,207,102,.2);color:#51cf66}.dice-row{display:flex;justify-content:center;gap:20px;margin:10px 0}.dice-slot{text-align:center}.dice-slot .slot-label{font-size:.75em;opacity:.5;margin-bottom:6px}.dice-wrap{width:90px;height:90px;perspective:500px}.dice{width:90px;height:90px;background:linear-gradient(145deg,#fff,#e0e0e0);border-radius:16px;display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);padding:12px;gap:3px;box-shadow:0 6px 20px rgba(0,0,0,.5),inset 0 2px 3px rgba(255,255,255,.8);transition:transform .3s}.dice.rolling{animation:roll .5s ease-out}.dice.waiting{opacity:.3}@keyframes roll{0%{transform:rotateX(0) rotateY(0) scale(.8)}25%{transform:rotateX(180deg) rotateY(90deg) scale(1.1)}50%{transform:rotateX(360deg) rotateY(180deg) scale(.9)}75%{transform:rotateX(540deg) rotateY(270deg) scale(1.05)}100%{transform:rotateX(720deg) rotateY(360deg) scale(1)}}.dot-cell{display:flex;align-items:center;justify-content:center}.dot{width:16px;height:16px;background:radial-gradient(circle at 35% 35%,#4a4a4a,#1a1a1a);border-radius:50%;box-shadow:inset 0 2px 3px rgba(0,0,0,.5);opacity:0;transition:opacity .2s}.dot.visible{opacity:1}.subtotal{margin-top:8px;font-size:.9em;opacity:.7;min-height:22px}.center-area{display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:100px;padding-top:30px}.vs-badge{font-size:2em;font-weight:bold;color:rgba(255,255,255,.2)}.phase-label{margin-top:10px;font-size:.85em;padding:4px 14px;border-radius:10px;background:rgba(255,255,255,.1);min-height:28px;text-align:center}.bet-area{margin-top:25px;text-align:center;display:none}.bet-area.visible{display:block}.bet-title{font-size:1.1em;margin-bottom:15px;color:#ffd700}.bet-type{display:flex;justify-content:center;gap:15px;margin-bottom:20px;flex-wrap:wrap}.type-btn{padding:14px 24px;border:2px solid rgba(255,255,255,.3);border-radius:14px;background:rgba(255,255,255,.05);color:#fff;font-size:1em;cursor:pointer;transition:all .2s;text-align:center}.type-btn:hover{background:rgba(255,255,255,.15)}.type-btn.selected{border-color:#ffd700;background:rgba(255,215,0,.2)}.type-btn .emoji{font-size:1.5em;display:block;margin-bottom:4px}.type-btn .desc{font-size:.75em;opacity:.7;margin-top:4px}.bet-amount{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin-bottom:15px}.chip{width:55px;height:55px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:.85em;cursor:pointer;border:3px dashed rgba(255,255,255,.4);transition:all .2s}.chip:hover{transform:scale(1.1)}.chip.selected{border-style:solid;transform:scale(1.15);box-shadow:0 0 20px rgba(255,255,255,.3)}.chip.c10{background:#3498db}.chip.c20{background:#2ecc71}.chip.c30{background:#e74c3c}.chip.c60{background:#9b59b6}.chip.c1{background:#1abc9c}.chip.c2{background:#e67e22}.chip.c3{background:#c0392b}.confirm-bet{padding:14px 50px;font-size:1.1em;font-weight:bold;color:#000;background:linear-gradient(145deg,#ffd700,#ffaa00);border:none;border-radius:30px;cursor:pointer;transition:all .3s;box-shadow:0 4px 15px rgba(255,215,0,.4)}.confirm-bet:hover{transform:translateY(-2px)}.confirm-bet:disabled{opacity:.4;cursor:not-allowed}.main-btn{display:block;width:100%;max-width:280px;margin:20px auto 0;padding:16px;font-size:1.2em;font-weight:bold;color:#000;background:linear-gradient(145deg,#ffd700,#ffaa00);border:none;border-radius:30px;cursor:pointer;transition:all .3s;box-shadow:0 5px 20px rgba(255,215,0,.4)}.main-btn:hover:not(:disabled){transform:translateY(-2px)}.main-btn:disabled{opacity:.4;cursor:not-allowed}.result-banner{text-align:center;font-size:1.4em;font-weight:bold;margin:20px 0 5px;min-height:40px;display:none}.result-banner.visible{display:block}.result-banner.win{color:#51cf66;text-shadow:0 0 20px rgba(81,207,102,.5)}.result-banner.lose{color:#ff6b6b;text-shadow:0 0 20px rgba(255,107,107,.5)}.result-banner.tie{color:#ffd43b}.result-detail{text-align:center;font-size:.9em;opacity:.7;margin-bottom:10px;display:none}.result-detail.visible{display:block}.history{margin-top:20px;background:rgba(0,0,0,.3);border-radius:16px;padding:14px;max-height:180px;overflow-y:auto;display:none}.history.visible{display:block}.history h3{font-size:.9em;opacity:.6;margin-bottom:8px}.hist-item{display:flex;justify-content:space-between;padding:6px 8px;border-bottom:1px solid rgba(255,255,255,.05);font-size:.8em}.hist-item:last-child{border:none}.hist-item .h-round{opacity:.4;width:40px}.hist-item .h-detail{flex:1;text-align:center}.hist-item .h-result{width:80px;text-align:right;font-weight:bold}.hist-item .h-result.win{color:#51cf66}.hist-item .h-result.lose{color:#ff6b6b}.hist-item .h-result.tie{color:#ffd43b}
.water-alert{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.8);background:rgba(20,15,40,.98);border:2px solid #74c0fc;border-radius:20px;padding:30px;z-index:300;opacity:0;pointer-events:none;transition:all .3s;text-align:center;min-width:280px}.water-alert.open{opacity:1;pointer-events:auto;transform:translate(-50%,-50%) scale(1)}.water-alert .emoji{font-size:3em;margin-bottom:15px}.water-alert .msg{font-size:1.2em;margin-bottom:20px;color:#74c0fc}.water-alert .close-btn{padding:10px 30px;border:1px solid #74c0fc;border-radius:20px;background:none;color:#74c0fc;cursor:pointer;font-size:1em}
.game-over{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:400;display:none;justify-content:center;align-items:center;flex-direction:column}.game-over.open{display:flex}.game-over .title{font-size:3em;margin-bottom:20px}.game-over .msg{font-size:1.5em;margin-bottom:30px;text-align:center;line-height:1.6}.game-over .restart-btn{padding:16px 50px;font-size:1.2em;font-weight:bold;color:#000;background:linear-gradient(145deg,#ffd700,#ffaa00);border:none;border-radius:30px;cursor:pointer}
.name-setup{display:flex;justify-content:center;align-items:center;min-height:60vh}.setup-box{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:20px;padding:30px;min-width:320px;text-align:center}.setup-box h3{margin-bottom:20px;color:#ffd700;font-size:1.3em}.setup-row{margin-bottom:15px;text-align:left}.setup-row label{display:block;font-size:.9em;opacity:.8;margin-bottom:6px}.setup-row input{width:100%;padding:10px 14px;border:1px solid rgba(255,255,255,.2);border-radius:10px;background:rgba(0,0,0,.3);color:#fff;font-size:1em;outline:none}.setup-row input:focus{border-color:#ffd700}.setup-btn{margin-top:10px;padding:12px 40px;font-size:1.1em;font-weight:bold;color:#000;background:linear-gradient(145deg,#ffd700,#ffaa00);border:none;border-radius:25px;cursor:pointer;transition:all .3s;box-shadow:0 4px 15px rgba(255,215,0,.4)}.setup-btn:hover{transform:translateY(-2px)}
.waiting-setup{display:flex;justify-content:center;align-items:center;min-height:60vh}
@media(max-width:600px){.players{flex-direction:column;align-items:center}.center-area{padding-top:10px}.dice-wrap,.dice{width:70px;height:70px;padding:8px}.dot{width:12px;height:12px}h1{font-size:1.4em}}
</style>
</head>
<body>
<div class="water-alert" id="waterAlert"><div class="emoji">💧</div><div class="msg" id="waterAlertMsg">喝一杯水！</div><button class="close-btn" onclick="closeWaterAlert()">知道了</button></div>
<div class="game-over" id="gameOver"><div class="title" id="gameOverTitle"></div><div class="msg" id="gameOverMsg"></div><button class="restart-btn" onclick="location.reload()">重新开始</button></div>
<div class="container">
<h1>🎲 挑战 hold-master</h1>

<!-- 玩家设置界面 -->
<div class="name-setup" id="playerSetup" style="display:none">
<div class="setup-box">
<h3>🎮 挑战者，报上名来</h3>
<div class="setup-row"><label>你的名字:</label><input type="text" id="playerNameInput" placeholder="输入你的名字" maxlength="20"></div>
<div style="margin-top:15px;padding:12px;background:rgba(255,215,0,.1);border-radius:10px;text-align:left;font-size:.85em">
<p>汇率: 1金币 = 2分钟 | 1杯水 = 6金币</p>
</div>
<button class="setup-btn" onclick="playerJoinGame()">进入挑战</button>
</div>
</div>

<!-- 等待界面 -->
<div class="waiting-setup" id="waitingSetup" style="display:none">
<div class="setup-box">
<h3>⏳ 等待游戏开始...</h3>
<p style="opacity:.7;margin-top:15px">游戏即将开始，请稍候</p>
</div>
</div>

<div class="rate-info" id="rateInfo" style="display:none">汇率: 1金币 = 2分钟 | 1杯水 = 6金币</div>

<div class="table" id="gameTable" style="display:none"><div class="players">
<div class="player-area boss">
<div class="label">👑 hold-master</div>
<div class="resources"><div class="res-item">💰 <span class="res-val res-gold" id="bossGoldDisplay">60</span> 金币</div></div>
<div class="dice-row"><div class="dice-slot"><div class="slot-label">骰子 1</div><div class="dice-wrap"><div class="dice waiting" id="bossDice1"></div></div></div><div class="dice-slot"><div class="slot-label">骰子 2</div><div class="dice-wrap"><div class="dice waiting" id="bossDice2"></div></div></div></div>
<div class="subtotal" id="bossSubtotal"></div>
</div>
<div class="center-area"><div class="vs-badge">VS</div><div class="phase-label" id="phaseLabel">等待开始</div></div>
<div class="player-area player" id="playerArea">
<div class="label" id="playerLabel">🎮 挑战者</div>
<div class="resources" id="playerResources">
<div class="res-item">⏱️ <span class="res-val res-time" id="playerTimeDisplay">120:00</span></div>
<div class="res-item">💧 <span class="res-val res-water" id="playerWaterDisplay">10</span> 杯</div>
</div>
<div class="dice-row"><div class="dice-slot"><div class="slot-label">骰子 1</div><div class="dice-wrap"><div class="dice waiting" id="playerDice1"></div></div></div><div class="dice-slot"><div class="slot-label">骰子 2</div><div class="dice-wrap"><div class="dice waiting" id="playerDice2"></div></div></div></div>
<div class="subtotal" id="playerSubtotal"></div>
</div>
</div>
<div class="bet-area" id="betArea"><div class="bet-title">💰 下注阶段</div><p style="font-size:.85em;opacity:.6;margin-bottom:12px" id="betHint">选择下注类型和金额</p>
<div class="bet-type"><div class="type-btn" onclick="selectBetType('time')"><span class="emoji">⏱️</span><div>押时间</div><div class="desc">赢→boss扣金币 输→你加时间</div></div><div class="type-btn" onclick="selectBetType('water')"><span class="emoji">💧</span><div>押水</div><div class="desc">赢→boss扣金币 输→你喝水</div></div></div>
<div class="bet-amount" id="betAmount"></div>
<button class="confirm-bet" id="confirmBet" onclick="confirmBet()" disabled>确认下注</button></div>
<div class="result-banner" id="resultBanner"></div><div class="result-detail" id="resultDetail"></div>
<button class="main-btn" id="mainBtn" onclick="onMainBtn()" style="display:none">🎲 开始挑战</button>
</div>
<div class="history" id="history"><h3> 历史记录</h3><div id="histList"></div></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, onValue, update, remove, onDisconnect } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyC1GwYRgXZ8DfTQ52PZ_KtWRtqa3DMtVlI",
  authDomain: "holdmaster-11c61.firebaseapp.com",
  databaseURL: "https://holdmaster-11c61-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "holdmaster-11c61",
  storageBucket: "holdmaster-11c61.firebasestorage.app",
  messagingSenderId: "341270683153",
  appId: "1:341270683153:web:15666c97e4fd9918b15bb0",
  measurementId: "G-0W2381KYG1"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ========== 全局状态 ==========
let playerId = null;
let playerName = '挑战者';
let secretMode = 3;

// 游戏状态（全部从 Firebase 同步）
let G = {
  phase: 'idle',
  round: 0,
  playerName: '',
  playerD1: 0, playerD2: 0,
  bossD1: 0, bossD2: 0,
  betType: '', betAmount: 0,
  resultOutcome: '', resultText: '', resultDetail: ''
};

let bossGold = 60;
let playerTimeSec = 7200;
let playerWater = 10;
let timerInterval = null, timerRunning = false;
let localBetType = '', localSelectedChip = 0;
let historyAdded = new Set(); // 防止重复添加历史

const DP={1:[4],2:[2,6],3:[2,4,6],4:[0,2,6,8],5:[0,2,4,6,8],6:[0,2,3,5,6,8]};
const MN=['👑 你必赢','💀 boss必赢',' 5局内你赢','🎯 纯随机'];

// ========== 工具函数 ==========
window.formatTime=function(sec){const h=Math.floor(sec/3600),m=Math.floor((sec%3600)/60),s=sec%60;const mm=(m<10?'0'+m:m),ss=(s<10?'0'+s:s);return h>0?h+':'+mm+':'+ss:mm+':'+ss};
window.renderDice=function(el,v){el.className='dice';el.innerHTML='';if(!v){el.classList.add('waiting');return}const p=DP[v]||[];for(let i=0;i<9;i++){const c=document.createElement('div');c.className='dot-cell';const d=document.createElement('div');d.className='dot'+(p.includes(i)?' visible':'');c.appendChild(d);el.appendChild(c)}};
window.randInt=function(a,b){return Math.floor(Math.random()*(b-a+1))+a};

window.closeWaterAlert=function(){document.getElementById('waterAlert').classList.remove('open')};
window.showWaterAlert=function(msg){document.getElementById('waterAlertMsg').textContent=msg;document.getElementById('waterAlert').classList.add('open')};

// ========== 骰子控制 ==========
function controlledRoll(isPlayer, round){
  if(secretMode===0) return isPlayer?randInt(4,6):randInt(1,3);
  if(secretMode===1) return isPlayer?randInt(1,3):randInt(4,6);
  if(secretMode===2 && round<=5) return isPlayer?randInt(3,6):randInt(1,4);
  return randInt(1,6);
}

// ========== UI 渲染 ==========
function renderGameUI(){
  const phase = G.phase;

  if(G.playerName){
    document.getElementById('playerLabel').textContent='🎮 '+G.playerName;
  }

  document.getElementById('bossGoldDisplay').textContent=bossGold;
  document.getElementById('playerTimeDisplay').textContent=formatTime(playerTimeSec);
  document.getElementById('playerWaterDisplay').textContent=playerWater;

  const pa=document.getElementById('playerArea');
  if(playerTimeSec<=180){pa.querySelector('.resources').classList.add('timer-warn')}
  else{pa.querySelector('.resources').classList.remove('timer-warn')}

  if(phase==='idle') return;

  if(phase==='waiting'){
    showGameTable();
    document.getElementById('phaseLabel').textContent='等待游戏开始...';
    document.getElementById('mainBtn').style.display='none';
    return;
  }

  showGameTable();

  if(phase==='roll1'){
    document.getElementById('phaseLabel').textContent='投第1个骰子...';
    document.getElementById('mainBtn').style.display='none';
    document.getElementById('betArea').classList.remove('visible');
    document.getElementById('resultBanner').className='result-banner';
    document.getElementById('resultDetail').className='result-detail';
  }

  if(phase==='betting'){
    document.getElementById('phaseLabel').textContent='💰 下注阶段';
    document.getElementById('betArea').classList.add('visible');
    document.getElementById('betHint').textContent='当前点数 → '+G.playerName+': '+G.playerD1+'  hold-master: '+G.bossD1+'  (还有1个骰子未投)';
    document.getElementById('mainBtn').style.display='none';
    renderBetChips();
  }

  if(phase==='roll2'){
    document.getElementById('phaseLabel').textContent='投第2个骰子...';
    document.getElementById('betArea').classList.remove('visible');
    document.getElementById('mainBtn').style.display='none';
  }

  if(phase==='result'){
    document.getElementById('phaseLabel').textContent='本局结束';
    document.getElementById('betArea').classList.remove('visible');
    const banner=document.getElementById('resultBanner');
    const detail=document.getElementById('resultDetail');
    banner.textContent=G.resultText;
    banner.className='result-banner visible '+G.resultOutcome;
    detail.textContent=G.resultDetail;
    detail.className='result-detail visible';
    document.getElementById('mainBtn').style.display='block';
    document.getElementById('mainBtn').textContent='🎲 继续挑战';
  }

  renderDice(document.getElementById('playerDice1'), G.playerD1);
  renderDice(document.getElementById('playerDice2'), G.playerD2);
  renderDice(document.getElementById('bossDice1'), G.bossD1);
  renderDice(document.getElementById('bossDice2'), G.bossD2);

  if(G.playerD1) document.getElementById('playerSubtotal').textContent = G.playerD2 ? '总计: '+(G.playerD1+G.playerD2) : '当前: '+G.playerD1;
  else document.getElementById('playerSubtotal').textContent='';

  if(G.bossD1) document.getElementById('bossSubtotal').textContent = G.bossD2 ? '总计: '+(G.bossD1+G.bossD2) : '当前: '+G.bossD1;
  else document.getElementById('bossSubtotal').textContent='';
}

function showGameTable(){
  document.getElementById('playerSetup').style.display='none';
  document.getElementById('waitingSetup').style.display='none';
  document.getElementById('gameTable').style.display='block';
  document.getElementById('rateInfo').style.display='block';
}

// ========== 玩家计时器 ==========
function startTimer(){
  if(timerRunning) return;
  timerRunning=true;
  timerInterval=setInterval(()=>{
    if(playerTimeSec>0){
      playerTimeSec--;
      document.getElementById('playerTimeDisplay').textContent=formatTime(playerTimeSec);
      const pa=document.getElementById('playerArea');
      if(playerTimeSec<=180){pa.querySelector('.resources').classList.add('timer-warn')}
      else{pa.querySelector('.resources').classList.remove('timer-warn')}
      if(playerTimeSec%5===0 && playerId){
        update(ref(db,'players/'+playerId),{time:playerTimeSec});
      }
      if(playerTimeSec<=0){
        clearInterval(timerInterval);
        timerRunning=false;
        checkGameOver();
      }
    }
  },1000);
}

function checkGameOver(){
  if(bossGold<=0){
    showGameOver(true);
  } else if(playerTimeSec<=0 && playerWater<=0){
    showGameOver(false);
  }
}

function showGameOver(playerWin){
  if(timerRunning){clearInterval(timerInterval);timerRunning=false}
  const go=document.getElementById('gameOver');
  go.classList.add('open');
  if(playerWin){
    document.getElementById('gameOverTitle').textContent=' 你赢了！';
    document.getElementById('gameOverMsg').innerHTML='hold-master 金币耗尽！<br>你成功击败了大Boss！';
  }else{
    document.getElementById('gameOverTitle').textContent='💀 你输了...';
    document.getElementById('gameOverMsg').innerHTML='时间和水都耗尽了...<br>hold-master 依然是王者';
  }
}

// ========== 下注 ==========
window.selectBetType=function(type){
  localBetType=type; localSelectedChip=0;
  document.querySelectorAll('.type-btn').forEach(b=>b.classList.remove('selected'));
  event.currentTarget.classList.add('selected');
  renderBetChips();
  checkBetReady();
};

window.renderBetChips=function(){
  const el=document.getElementById('betAmount');el.innerHTML='';
  if(localBetType==='time'){
    [10,20,30,60].forEach(v=>{
      const d=document.createElement('div');d.className='chip c'+v;d.textContent=v;
      d.onclick=()=>selectChip(v);el.appendChild(d);
    });
  }else{
    [1,2,3].forEach(v=>{
      const d=document.createElement('div');d.className='chip c'+v;d.textContent=v+'杯';
      d.onclick=()=>selectChip(v);el.appendChild(d);
    });
  }
};

window.selectChip=function(val){
  localSelectedChip=val;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('selected'));
  event.target.classList.add('selected');
  checkBetReady();
};

window.checkBetReady=function(){
  document.getElementById('confirmBet').disabled=!(localBetType&&localSelectedChip);
};

window.confirmBet=function(){
  if(!localBetType||!localSelectedChip) return;
  set(ref(db,'game/betType'), localBetType);
  set(ref(db,'game/betAmount'), localSelectedChip);
  set(ref(db,'game/phase'), 'roll2');
  localBetType=''; localSelectedChip=0;
};

// ========== 主按钮 ==========
window.onMainBtn=function(){
  if(G.phase==='result' || G.phase==='idle'){
    startNewRound();
  }
};

function startNewRound(){
  const newRound = (G.round||0) + 1;
  set(ref(db,'game'), {
    phase: 'roll1',
    round: newRound,
    playerName: playerName,
    playerD1: 0, playerD2: 0,
    bossD1: 0, bossD2: 0,
    betType: '', betAmount: 0,
    resultOutcome: '', resultText: '', resultDetail: ''
  });
}

// ========== 玩家加入 ==========
window.playerJoinGame=function(){
  const pi=document.getElementById('playerNameInput').value.trim();
  playerName=pi||'挑战者';
  playerId='player_'+Date.now();
  document.getElementById('playerLabel').textContent='🎮 '+playerName;
  document.getElementById('playerSetup').style.display='none';

  set(ref(db,'players/'+playerId),{
    name:playerName,
    time:playerTimeSec,
    water:playerWater,
    status:'active'
  });

  onDisconnect(ref(db,'players/'+playerId)).remove();
  
  document.getElementById('waitingSetup').style.display='flex';
};

// ========== 历史记录 ==========
function addHistory(outcome){
  const roundKey = G.round+'_'+G.playerName;
  if(historyAdded.has(roundKey)) return;
  historyAdded.add(roundKey);

  const hist=document.getElementById('history'),list=document.getElementById('histList');
  hist.classList.add('visible');
  const ti=G.betType==='time'?'⏱️':'💧';
  const txt={win:'胜',lose:'负',tie:'平局'};
  const pt=G.playerD1+G.playerD2, bt=G.bossD1+G.bossD2;
  const item=document.createElement('div');
  item.className='hist-item';
  item.innerHTML='<span class="h-round">#'+G.round+'</span><span class="h-detail">'+G.playerName+' '+pt+' vs '+bt+' boss</span><span class="h-result '+outcome+'">'+txt[outcome]+' '+ti+G.betAmount+'</span>';
  list.insertBefore(item,list.firstChild);
}

// ========== Firebase 监听 ==========
function initSync(){
  onValue(ref(db,'boss/mode'),(snap)=>{
    secretMode=snap.val()||3;
  });

  onValue(ref(db,'boss/gold'),(snap)=>{
    bossGold=snap.val()||60;
    document.getElementById('bossGoldDisplay').textContent=bossGold;
  });

  onValue(ref(db,'game'),(snap)=>{
    if(!snap.exists()) return;
    const data=snap.val();
    const oldPhase=G.phase;
    G={...G,...data};

    if(G.phase==='roll1' && oldPhase!=='roll1'){
      animateRoll1();
    } else if(G.phase==='roll2' && oldPhase!=='roll2'){
      animateRoll2();
    } else if(G.phase==='result' && oldPhase!=='result'){
      if(!G.resultOutcome){
        calculateAndWriteResult();
      } else {
        addHistory(G.resultOutcome);
        if(G.betType==='water' && G.resultOutcome==='lose'){
          setTimeout(()=>showWaterAlert(playerName+'，喝了'+G.betAmount+'杯水！'),500);
        }
        setTimeout(()=>checkGameOver(),1000);
      }
    }

    if(G.phase==='waiting' && G.playerName && !timerRunning){
      startTimer();
    }

    renderGameUI();
  });

  onValue(ref(db,'players'),(snap)=>{
    if(snap.exists()){
      const players=snap.val();
      const keys=Object.keys(players);
      if(keys.length>0){
        const p=players[keys[0]];
        playerTimeSec=p.time||7200;
        playerWater=p.water||10;
        if(!G.playerName) G.playerName=p.name||'挑战者';
        document.getElementById('playerTimeDisplay').textContent=formatTime(playerTimeSec);
        document.getElementById('playerWaterDisplay').textContent=playerWater;
        document.getElementById('playerLabel').textContent='🎮 '+G.playerName;
      }
    }
  });
}

// ========== 骰子动画 ==========
function animateRoll1(){
  const pe=document.getElementById('playerDice1'),be=document.getElementById('bossDice1');
  pe.classList.add('rolling');be.classList.add('rolling');
  let f=0;
  const iv=setInterval(()=>{
    renderDice(pe,randInt(1,6));renderDice(be,randInt(1,6));
    f++;
    if(f>7){
      clearInterval(iv);
      pe.classList.remove('rolling');be.classList.remove('rolling');
      const pd1=controlledRoll(true,G.round);
      const bd1=controlledRoll(false,G.round);
      set(ref(db,'game/playerD1'),pd1);
      set(ref(db,'game/bossD1'),bd1);
      setTimeout(()=>{
        set(ref(db,'game/phase'),'betting');
      },600);
    }
  },80);
}

function animateRoll2(){
  const pe=document.getElementById('playerDice2'),be=document.getElementById('bossDice2');
  pe.classList.add('rolling');be.classList.add('rolling');
  let f=0;
  const iv=setInterval(()=>{
    renderDice(pe,randInt(1,6));renderDice(be,randInt(1,6));
    f++;
    if(f>7){
      clearInterval(iv);
      pe.classList.remove('rolling');be.classList.remove('rolling');
      const pd2=controlledRoll(true,G.round);
      const bd2=controlledRoll(false,G.round);
      set(ref(db,'game/playerD2'),pd2);
      set(ref(db,'game/bossD2'),bd2);
      setTimeout(()=>{
        calculateAndWriteResult();
      },500);
    }
  },80);
}

// ========== 计算结果 ==========
function calculateAndWriteResult(){
  const pt=G.playerD1+G.playerD2;
  const bt=G.bossD1+G.bossD2;
  let outcome,resultText,detailText;
  const pName=G.playerName||playerName;

  if(pt>bt){
    outcome='win';
    resultText=' '+pName+' 赢了这局！';
    if(G.betType==='time'){
      const goldCost=Math.ceil(G.betAmount/2);
      bossGold=Math.max(0,bossGold-goldCost);
      detailText='押'+G.betAmount+'分钟 → hold-master 输'+goldCost+'金币';
    }else if(G.betType==='water'){
      const goldCost=G.betAmount*3;
      bossGold=Math.max(0,bossGold-goldCost);
      detailText='押'+G.betAmount+'杯水 → hold-master 输'+goldCost+'金币';
    }else{
      detailText='点数: '+pName+' '+pt+' vs '+bt+' hold-master';
    }
  }else if(pt<bt){
    outcome='lose';
    resultText='😢 '+pName+' 输了这局...';
    if(G.betType==='time'){
      playerTimeSec+=G.betAmount*60;
      detailText='押'+G.betAmount+'分钟 → 你的时间增加'+G.betAmount+'分钟';
    }else if(G.betType==='water'){
      playerWater=Math.max(0,playerWater-G.betAmount);
      detailText='押'+G.betAmount+'杯水 → 你喝了'+G.betAmount+'杯水';
    }else{
      detailText='点数: '+pName+' '+pt+' vs '+bt+' hold-master';
    }
  }else{
    outcome='tie';
    resultText='⚖️ 平局！';
    detailText='点数相同，无变化';
  }

  const updates={};
  updates['game/resultOutcome']=outcome;
  updates['game/resultText']=resultText;
  updates['game/resultDetail']=pName+' '+G.playerD1+'+'+G.playerD2+'='+pt+' vs '+G.bossD1+'+'+G.bossD2+'='+bt+' hold-master | '+detailText;
  updates['game/phase']='result';
  updates['boss/gold']=bossGold;

  if(playerId){
    updates['players/'+playerId+'/time']=playerTimeSec;
    updates['players/'+playerId+'/water']=playerWater;
  }

  update(ref(db),updates);

  addHistory(outcome);

  if(G.betType==='water' && outcome==='lose'){
    setTimeout(()=>showWaterAlert(pName+'，喝了'+G.betAmount+'杯水！'),500);
  }

  setTimeout(()=>checkGameOver(),1000);
}

// ========== 初始化 ==========
function initUI(){
  renderDice(document.getElementById('playerDice1'),1);
  renderDice(document.getElementById('playerDice2'),1);
  renderDice(document.getElementById('bossDice1'),1);
  renderDice(document.getElementById('bossDice2'),1);
  document.getElementById('playerDice1').classList.add('waiting');
  document.getElementById('playerDice2').classList.add('waiting');
  document.getElementById('bossDice1').classList.add('waiting');
  document.getElementById('bossDice2').classList.add('waiting');

  document.getElementById('playerSetup').style.display='flex';
  initSync();
}

try {
  initUI();
} catch(e) {
  console.error('初始化失败:', e);
  initUI();
}
</script>
