<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> hold-master 管理后台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);min-height:100vh;color:#fff;overflow-x:hidden}
.container{max-width:600px;margin:0 auto;padding:40px 20px}
h1{text-align:center;font-size:2em;margin-bottom:10px;color:#ffd700;text-shadow:0 0 20px rgba(255,215,0,0.5)}
.subtitle{text-align:center;opacity:.6;margin-bottom:40px;font-size:.9em}
.card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:30px;margin-bottom:20px}
.card h2{font-size:1.2em;margin-bottom:20px;color:#ffd700;display:flex;align-items:center;gap:10px}
.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:15px}
.mode-btn{padding:20px;border:2px solid rgba(255,255,255,.2);border-radius:15px;background:rgba(255,255,255,.05);color:#fff;font-size:1em;cursor:pointer;transition:all .3s;text-align:center}
.mode-btn:hover{background:rgba(255,255,255,.1);transform:translateY(-2px)}
.mode-btn.active{border-color:#ffd700;background:rgba(255,215,0,.15);box-shadow:0 0 20px rgba(255,215,0,.3)}
.mode-btn .emoji{font-size:2em;display:block;margin-bottom:8px}
.mode-btn .label{font-weight:bold}
.mode-btn .desc{font-size:.8em;opacity:.7;margin-top:5px}
.status-item{display:flex;justify-content:space-between;align-items:center;padding:15px;background:rgba(0,0,0,.2);border-radius:10px;margin-bottom:10px}
.status-item .label{opacity:.7;font-size:.9em}
.status-item .value{font-weight:bold;font-size:1.1em}
.status-item .value.gold{color:#ffd700}
.status-item .value.time{color:#51cf66}
.status-item .value.water{color:#74c0fc}
.player-list{max-height:200px;overflow-y:auto}
.player-item{display:flex;justify-content:space-between;align-items:center;padding:12px;background:rgba(0,0,0,.2);border-radius:10px;margin-bottom:8px}
.player-item .name{font-weight:bold}
.player-item .stats{font-size:.85em;opacity:.7}
.action-btn{width:100%;padding:15px;font-size:1.1em;font-weight:bold;color:#000;background:linear-gradient(145deg,#ffd700,#ffaa00);border:none;border-radius:15px;cursor:pointer;transition:all .3s;margin-top:10px}
.action-btn:hover{transform:translateY(-2px);box-shadow:0 5px 20px rgba(255,215,0,.4)}
.action-btn.danger{background:linear-gradient(145deg,#ff6b6b,#ee5a52)}
.conn-status{position:fixed;top:20px;right:20px;font-size:.8em;padding:6px 12px;border-radius:15px;background:rgba(0,0,0,.5)}
.conn-status.ok{color:#51cf66;border:1px solid #51cf66}
.conn-status.err{color:#ff6b6b;border:1px solid #ff6b6b}
.empty-state{text-align:center;padding:30px;opacity:.5}
</style>
</head>
<body>
<div class="conn-status" id="connStatus">连接中...</div>
<div class="container">
<h1> hold-master</h1>
<p class="subtitle">管理后台 - 控制游戏模式和状态</p>

<div class="card">
<h2>🎯 难度模式</h2>
<div class="mode-grid">
<button class="mode-btn" data-mode="0" onclick="setMode(0)">
<span class="emoji">👑</span>
<span class="label">玩家必赢</span>
<span class="desc">Boss容易输</span>
</button>
<button class="mode-btn" data-mode="1" onclick="setMode(1)">
<span class="emoji">💀</span>
<span class="label">Boss必赢</span>
<span class="desc">玩家很难赢</span>
</button>
<button class="mode-btn" data-mode="2" onclick="setMode(2)">
<span class="emoji">🔥</span>
<span class="label">5局内玩家赢</span>
<span class="desc">前5局玩家优势</span>
</button>
<button class="mode-btn" data-mode="3" onclick="setMode(3)">
<span class="emoji">🎯</span>
<span class="label">纯随机</span>
<span class="desc">完全随机</span>
</button>
</div>
</div>

<div class="card">
<h2>📊 游戏状态</h2>
<div class="status-item">
<span class="label">💰 Boss金币</span>
<span class="value gold" id="bossGold">60</span>
</div>
<div class="status-item">
<span class="label">⏱️ 玩家时间</span>
<span class="value time" id="playerTime">120:00</span>
</div>
<div class="status-item">
<span class="label">💧 玩家水量</span>
<span class="value water" id="playerWater">10杯</span>
</div>
<div class="status-item">
<span class="label">🎮 当前回合</span>
<span class="value" id="currentRound">-</span>
</div>
<div class="status-item">
<span class="label"> 游戏阶段</span>
<span class="value" id="gamePhase">等待开始</span>
</div>
</div>

<div class="card">
<h2> 在线玩家</h2>
<div class="player-list" id="playerList">
<div class="empty-state">暂无玩家在线</div>
</div>
</div>

<div class="card">
<h2>🔧 操作</h2>
<button class="action-btn" onclick="resetGame()">🔄 重置游戏</button>
<button class="action-btn danger" onclick="clearAllData()">⚠️ 清除所有数据</button>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, set, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyC1GwYRgXZ8DfTQ52PZ_KtWRtqa3DMtVlI",
  authDomain: "holdmaster-11c61.firebaseapp.com",
  databaseURL: "https://holdmaster-11c61-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "holdmaster-11c61",
  storageBucket: "holdmaster-11c61.firebasestorage.app",
  messagingSenderId: "341270683153",
  appId: "1:341270683153:web:15666c97e4fd9918b15bb0",
  measurementId: "G-0W2381KYG1"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let secretMode = 3;
let bossGold = 60;
let playerTimeSec = 7200;
let playerWater = 10;

const MN=[' 玩家必赢','💀 Boss必赢','🔥 5局内玩家赢','🎯 纯随机'];

function formatTime(sec){const m=Math.floor(sec/60),s=sec%60;return(m<10?'0'+m:m)+':'+(s<10?'0'+s:s)};

function setConnStatus(ok){
  const el=document.getElementById('connStatus');
  el.textContent=ok?'✅ 已连接':'❌ 连接断开';
  el.className='conn-status '+(ok?'ok':'err');
}

window.setMode=function(m){
  secretMode=m;
  set(ref(db,'boss/mode'),m);
  updateModeButtons();
};

function updateModeButtons(){
  document.querySelectorAll('.mode-btn').forEach(btn=>{
    btn.classList.toggle('active', parseInt(btn.dataset.mode)===secretMode);
  });
}

function initSync(){
  onValue(ref(db,'boss/mode'),(snap)=>{
    secretMode=snap.val()||3;
    updateModeButtons();
    setConnStatus(true);
  });

  onValue(ref(db,'boss/gold'),(snap)=>{
    bossGold=snap.val()||60;
    document.getElementById('bossGold').textContent=bossGold;
  });

  onValue(ref(db,'game'),(snap)=>{
    if(snap.exists()){
      const g=snap.val();
      document.getElementById('currentRound').textContent=g.round||'-';
      const phaseNames={idle:'等待开始',waiting:'等待玩家',roll1:'投骰子1',betting:'下注阶段',roll2:'投骰子2',result:'本局结束'};
      document.getElementById('gamePhase').textContent=phaseNames[g.phase]||g.phase;
    }else{
      document.getElementById('currentRound').textContent='-';
      document.getElementById('gamePhase').textContent='等待开始';
    }
  });

  onValue(ref(db,'players'),(snap)=>{
    const list=document.getElementById('playerList');
    if(snap.exists()){
      list.innerHTML='';
      snap.forEach((child)=>{
        const p=child.val();
        const div=document.createElement('div');
        div.className='player-item';
        div.innerHTML='<div><span class="name">'+p.name+'</span><br><span class="stats">'+formatTime(p.time)+' | 💧'+p.water+'</span></div><span style="color:#51cf66;font-size:.8em">● 在线</span>';
        list.appendChild(div);
      });
    }else{
      list.innerHTML='<div class="empty-state">暂无玩家在线</div>';
    }
  });
}

window.resetGame=function(){
  if(confirm('确定要重置游戏吗？所有进度将丢失。')){
    set(ref(db,'boss/gold'),60);
    set(ref(db,'game'),{
      phase:'idle',round:0,playerName:'',
      playerD1:0,playerD2:0,bossD1:0,bossD2:0,
      betType:'',betAmount:0,
      resultOutcome:'',resultText:'',resultDetail:''
    });
    alert('游戏已重置');
  }
};

window.clearAllData=function(){
  if(confirm('⚠️ 确定要清除所有数据吗？此操作不可恢复！')){
    remove(ref(db,'boss'));
    remove(ref(db,'game'));
    remove(ref(db,'players'));
    alert('所有数据已清除');
    location.reload();
  }
};

try {
  initSync();
} catch(e) {
  console.error('初始化失败:', e);
  setConnStatus(false);
}
</script>
</body>
</html>
